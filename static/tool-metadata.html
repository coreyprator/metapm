<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tool Metadata Admin | MetaPM</title>
<style>
  :root { --bg:#0f1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --accent2:#bc8cff; --warn:#d29922; --ok:#3fb950; --fail:#f85149; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); padding:20px; }
  .container { max-width:1400px; margin:0 auto; }
  .back-link { color:var(--accent); text-decoration:none; font-size:13px; margin-bottom:12px; display:inline-block; }
  h1 { font-size:22px; color:#f0f6fc; margin-bottom:4px; }
  .subtitle { color:var(--muted); font-size:13px; margin-bottom:16px; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
  input, select { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-size:13px; font-family:inherit; }
  button { background:transparent; color:var(--accent); border:1px solid var(--accent); border-radius:6px; padding:8px 14px; font-size:13px; cursor:pointer; }
  button:hover { background:var(--accent); color:#0d1117; }
  table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:12.5px; vertical-align:top; }
  tr:hover { background:#1e242c; cursor:pointer; }
  tr:last-child td { border-bottom:none; }
  .tool-name { font-family:'SFMono-Regular',Consolas,monospace; color:var(--accent); }
  .needs { color:var(--warn); font-style:italic; }
  .truncate { max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:22px; width:100%; max-width:720px; max-height:90vh; overflow-y:auto; }
  .modal h2 { font-size:17px; color:#f0f6fc; margin-bottom:16px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-bottom:4px; }
  .field input, .field select, .field textarea { width:100%; }
  .field textarea { min-height:72px; resize:vertical; font-family:inherit; line-height:1.5; }
  .readonly { color:var(--muted); font-family:'SFMono-Regular',Consolas,monospace; font-size:13px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
  button.secondary { color:var(--muted); border-color:var(--border); }
  button.danger { color:var(--fail); border-color:var(--fail); }
  button.danger:hover { background:var(--fail); color:#0d1117; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="/">&larr; Dashboard</a>
  <h1>Tool Metadata Admin</h1>
  <p class="subtitle">Curate when-to-use / forbidden-uses / gotchas for each MCP tool. Changes persist to <code>mcp_tool_metadata</code>.</p>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Filter by tool name or server..." style="flex:1" />
    <select id="needs-filter">
      <option value="">All rows</option>
      <option value="1">Needs curation only</option>
    </select>
    <input type="password" id="apikey" placeholder="X-API-Key (required to save)" style="width:300px" />
    <button id="new-btn">+ New Row</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tool Name</th><th>Server</th><th>Category</th>
        <th>When to Use</th><th>Forbidden</th><th>Gotchas</th>
      </tr>
    </thead>
    <tbody id="rows"><tr><td colspan="6" style="color:var(--muted);padding:20px;text-align:center">Loading…</td></tr></tbody>
  </table>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2 id="modal-title">Edit Tool Metadata</h2>
    <div class="field"><label>Tool Name</label><div class="readonly" id="m-tool_name"></div></div>
    <div class="field"><label>Server</label><div class="readonly" id="m-server"></div></div>
    <div class="field">
      <label>Category</label>
      <select id="m-category">
        <option value="state_write">state_write</option>
        <option value="state_read">state_read</option>
        <option value="semantic_search">semantic_search</option>
        <option value="workflow">workflow</option>
        <option value="discovery">discovery</option>
        <option value="content_retrieval">content_retrieval</option>
      </select>
    </div>
    <div class="field"><label>When to Use</label><textarea id="m-when_to_use"></textarea></div>
    <div class="field"><label>Forbidden Uses</label><textarea id="m-forbidden_uses"></textarea></div>
    <div class="field"><label>Gotchas</label><textarea id="m-gotchas"></textarea></div>
    <div class="modal-actions">
      <button class="danger" id="del-btn">Delete</button>
      <button class="secondary" id="cancel-btn">Cancel</button>
      <button id="save-btn">Save</button>
    </div>
  </div>
</div>

<script>
let rows = [];
let editingOriginal = null;
const $ = (id) => document.getElementById(id);

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function trunc(s, n=50){ const t = s||''; return t.length > n ? t.slice(0, n-1) + '…' : t; }

async function load() {
  const r = await fetch('/api/mcp-tool-metadata');
  const data = await r.json();
  rows = data.rows || [];
  render();
}

function render() {
  const q = ($('search').value || '').toLowerCase();
  const needsOnly = $('needs-filter').value === '1';
  const filtered = rows.filter(r =>
    (!q || r.tool_name.toLowerCase().includes(q) || r.server.toLowerCase().includes(q))
    && (!needsOnly || r.needs_curation)
  );
  const tbody = $('rows');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--muted);padding:20px;text-align:center">No rows match.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(r => `
    <tr data-key="${esc(r.server)}|${esc(r.tool_name)}">
      <td class="tool-name">${esc(r.tool_name)}</td>
      <td>${esc(r.server)}</td>
      <td>${esc(r.category || '')}</td>
      <td class="truncate ${r.needs_curation ? 'needs' : ''}">${r.needs_curation ? '(needs curation)' : esc(trunc(r.when_to_use, 60))}</td>
      <td class="truncate">${esc(trunc(r.forbidden_uses, 50))}</td>
      <td class="truncate">${esc(trunc(r.gotchas, 50))}</td>
    </tr>
  `).join('');
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => {
      const [server, tool] = tr.dataset.key.split('|');
      const row = rows.find(x => x.server === server && x.tool_name === tool);
      openEdit(row);
    });
  });
}

function openEdit(row) {
  editingOriginal = row;
  $('modal-title').textContent = row ? 'Edit Tool Metadata' : 'New Tool Metadata';
  $('m-tool_name').textContent = row ? row.tool_name : '';
  $('m-server').textContent = row ? row.server : '';
  $('m-category').value = row ? (row.category || 'workflow') : 'workflow';
  $('m-when_to_use').value = row ? (row.when_to_use || '') : '';
  $('m-forbidden_uses').value = row ? (row.forbidden_uses || '') : '';
  $('m-gotchas').value = row ? (row.gotchas || '') : '';
  $('del-btn').style.display = row ? '' : 'none';
  if (!row) {
    const nameField = document.createElement('input');
    nameField.id = 'm-tool_name-input';
    nameField.placeholder = 'e.g. new_tool_name';
    $('m-tool_name').innerHTML = '';
    $('m-tool_name').appendChild(nameField);

    const serverSel = document.createElement('select');
    serverSel.id = 'm-server-input';
    ['metapm','portfolio-rag','gmail','calendar','drive','builtin'].forEach(s => {
      const o = new Option(s, s);
      serverSel.appendChild(o);
    });
    $('m-server').innerHTML = '';
    $('m-server').appendChild(serverSel);
  }
  $('modal').classList.add('open');
}

$('new-btn').onclick = () => openEdit(null);
$('cancel-btn').onclick = () => $('modal').classList.remove('open');

$('save-btn').onclick = async () => {
  const apiKey = $('apikey').value;
  if (!apiKey) { alert('API key required'); return; }
  const payload = {
    tool_name: editingOriginal ? editingOriginal.tool_name : $('m-tool_name-input').value.trim(),
    server: editingOriginal ? editingOriginal.server : $('m-server-input').value,
    category: $('m-category').value,
    when_to_use: $('m-when_to_use').value || null,
    forbidden_uses: $('m-forbidden_uses').value || null,
    gotchas: $('m-gotchas').value || null,
  };
  if (!payload.tool_name || !payload.server) { alert('tool_name and server required'); return; }
  const r = await fetch('/api/mcp-tool-metadata', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'X-API-Key': apiKey },
    body: JSON.stringify(payload)
  });
  if (!r.ok) { alert('Save failed: ' + (await r.text())); return; }
  $('modal').classList.remove('open');
  await load();
};

$('del-btn').onclick = async () => {
  if (!editingOriginal) return;
  if (!confirm(`Delete ${editingOriginal.tool_name} on ${editingOriginal.server}?`)) return;
  const apiKey = $('apikey').value;
  if (!apiKey) { alert('API key required'); return; }
  const url = `/api/mcp-tool-metadata/${encodeURIComponent(editingOriginal.server)}/${encodeURIComponent(editingOriginal.tool_name)}`;
  const r = await fetch(url, { method:'DELETE', headers: { 'X-API-Key': apiKey } });
  if (!r.ok) { alert('Delete failed: ' + (await r.text())); return; }
  $('modal').classList.remove('open');
  await load();
};

$('search').oninput = render;
$('needs-filter').onchange = render;

load();
</script>
</body>
</html>
