<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulk Seed - MetaPM</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2d;
      --panel-soft: #0f1729;
      --text: #e6edf8;
      --muted: #9aa8c7;
      --line: #26344f;
      --accent: #e74c3c;
      --ok: #23a55a;
      --warn: #f5a623;
      --info: #4a90d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 1000px;
      margin: 0 auto;
      padding: 10px 16px 40px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .title { font-size: 22px; font-weight: 700; }
    a.back-link { color: var(--info); text-decoration: none; font-size: 13px; }
    a.back-link:hover { text-decoration: underline; }

    .tabs { display: flex; gap: 0; margin-bottom: 0; }
    .tab-btn {
      padding: 10px 24px;
      background: var(--panel-soft);
      color: var(--muted);
      border: 1px solid var(--line);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .tab-btn.active {
      background: var(--panel);
      color: var(--text);
      border-bottom-color: var(--panel);
    }
    .tab-content {
      display: none;
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 10px 10px;
      background: var(--panel);
      padding: 16px;
    }
    .tab-content.active { display: block; }

    textarea.json-input {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 13px;
      resize: vertical;
    }
    textarea.json-input:focus { outline: none; border-color: var(--info); }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    button.action-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    button.action-btn:hover:not(:disabled) { opacity: 0.85; }
    .btn-validate { background: var(--info); color: white; }
    .btn-seed { background: var(--ok); color: white; }
    .btn-clear { background: #374151; color: #d1d5db; }

    .error-box {
      background: #2d1515;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 10px 14px;
      margin-top: 12px;
      color: #fca5a5;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .preview-table, .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 12px;
    }
    .preview-table th, .results-table th {
      text-align: left;
      padding: 8px;
      border-bottom: 2px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }
    .preview-table td, .results-table td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
    }
    .summary-bar {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
    }
    .summary-ok { background: #14532d; color: #bbf7d0; }
    .summary-partial { background: #713f12; color: #fde68a; }
    .summary-fail { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>
  <div class="app">
    <div class="card header">
      <div class="title">🌱 Bulk Seed</div>
      <a class="back-link" href="/static/dashboard.html">&larr; Back to Dashboard</a>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('req')">Requirements</button>
      <button class="tab-btn" onclick="switchTab('ll')">Lessons Learned</button>
    </div>

    <!-- Requirements Tab -->
    <div class="tab-content active" id="tab-req">
      <label style="font-size:13px;color:var(--muted);margin-bottom:6px;display:block">Paste Requirements JSON</label>
      <textarea class="json-input" id="req-input" placeholder='[{"project_id":"proj-mp","title":"...","description":"...","type":"feature","priority":"P1"}]'></textarea>
      <div class="btn-row">
        <button class="action-btn btn-validate" onclick="validateReq()">Validate</button>
        <button class="action-btn btn-seed" id="req-seed-btn" onclick="seedReq()" disabled>Seed Requirements</button>
        <button class="action-btn btn-clear" onclick="clearReq()">Clear</button>
      </div>
      <div id="req-error" style="display:none"></div>
      <div id="req-preview" style="display:none"></div>
      <div id="req-results" style="display:none"></div>
    </div>

    <!-- Lessons Learned Tab -->
    <div class="tab-content" id="tab-ll">
      <label style="font-size:13px;color:var(--muted);margin-bottom:6px;display:block">Paste Lessons Learned JSON</label>
      <textarea class="json-input" id="ll-input" placeholder='[{"title":"...","description":"what happened","resolution":"the fix","category":"Process","routing":"Bootstrap"}]'></textarea>
      <div class="btn-row">
        <button class="action-btn btn-validate" onclick="validateLL()">Validate</button>
        <button class="action-btn btn-seed" id="ll-seed-btn" onclick="seedLL()" disabled>Seed Lessons</button>
        <button class="action-btn btn-clear" onclick="clearLL()">Clear</button>
      </div>
      <div id="ll-error" style="display:none"></div>
      <div id="ll-preview" style="display:none"></div>
      <div id="ll-results" style="display:none"></div>
    </div>
  </div>

  <script>
    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (tab === 'req') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('tab-req').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('tab-ll').classList.add('active');
      }
    }

    // Helpers
    function showError(id, msg) {
      const el = document.getElementById(id);
      el.className = 'error-box';
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideEl(id) { document.getElementById(id).style.display = 'none'; }
    function showEl(id) { document.getElementById(id).style.display = 'block'; }
    function truncate(s, n) { return (s || '').length > n ? (s || '').substring(0, n - 3) + '...' : (s || ''); }

    // ── Requirements ──

    const REQ_TYPES = ['feature', 'bug', 'enhancement', 'chore', 'research'];
    const REQ_PRIORITIES = ['P1', 'P2', 'P3'];
    let reqParsed = null;

    function validateReq() {
      hideEl('req-error');
      hideEl('req-preview');
      hideEl('req-results');
      document.getElementById('req-seed-btn').disabled = true;
      reqParsed = null;

      const raw = document.getElementById('req-input').value.trim();
      if (!raw) { showError('req-error', 'Input is empty.'); return; }

      let data;
      try { data = JSON.parse(raw); } catch (e) {
        showError('req-error', 'Invalid JSON: ' + e.message);
        return;
      }
      if (!Array.isArray(data)) { showError('req-error', 'JSON must be an array of requirement objects.'); return; }
      if (data.length === 0) { showError('req-error', 'Array is empty.'); return; }

      const errors = [];
      data.forEach((item, i) => {
        const missing = [];
        ['project_id', 'title', 'description', 'type', 'priority'].forEach(f => {
          if (!item[f] || (typeof item[f] === 'string' && !item[f].trim())) missing.push(f);
        });
        if (missing.length) errors.push(`Item ${i + 1}: missing required fields: ${missing.join(', ')}`);
        if (item.type && !REQ_TYPES.includes(item.type)) errors.push(`Item ${i + 1}: invalid type "${item.type}" (must be one of: ${REQ_TYPES.join(', ')})`);
        if (item.priority && !REQ_PRIORITIES.includes(item.priority)) errors.push(`Item ${i + 1}: invalid priority "${item.priority}" (must be one of: ${REQ_PRIORITIES.join(', ')})`);
      });

      if (errors.length) { showError('req-error', errors.join('\n')); return; }

      reqParsed = data;
      let html = '<table class="preview-table"><thead><tr><th>#</th><th>Project ID</th><th>Title</th><th>Type</th><th>Priority</th><th>Description</th></tr></thead><tbody>';
      data.forEach((item, i) => {
        html += `<tr><td>${i + 1}</td><td>${truncate(item.project_id, 12)}</td><td>${esc(item.title)}</td><td>${item.type}</td><td>${item.priority}</td><td>${esc(truncate(item.description, 80))}</td></tr>`;
      });
      html += '</tbody></table>';
      const preview = document.getElementById('req-preview');
      preview.innerHTML = html;
      showEl('req-preview');
      document.getElementById('req-seed-btn').disabled = false;
    }

    async function seedReq() {
      if (!reqParsed) return;
      const btn = document.getElementById('req-seed-btn');
      btn.disabled = true;
      btn.textContent = 'Seeding...';
      hideEl('req-error');

      // Cache project_id -> project_code mapping
      const projectCodeCache = {};

      const results = [];
      for (const item of reqParsed) {
        try {
          // Resolve project code from project_id if not cached
          if (!projectCodeCache[item.project_id]) {
            const projRes = await fetch('/api/roadmap/projects');
            if (projRes.ok) {
              const projData = await projRes.json();
              for (const p of (projData.projects || [])) {
                projectCodeCache[p.id] = p.code;
              }
            }
          }
          const projCode = projectCodeCache[item.project_id] || 'MP';

          // Get next auto-generated code
          const codeRes = await fetch(`/api/roadmap/next-code/${projCode}/${item.type}`);
          let code = '';
          if (codeRes.ok) {
            const codeData = await codeRes.json();
            code = codeData.code || '';
          }

          const res = await fetch('/api/roadmap/requirements', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              id: crypto.randomUUID(),
              project_id: item.project_id,
              code: code,
              title: item.title,
              description: item.description,
              type: item.type,
              priority: item.priority
            })
          });
          const data = await res.json();
          if (res.ok) {
            results.push({ title: item.title, code: data.code || code || '-', ok: true });
          } else {
            results.push({ title: item.title, code: '-', ok: false, error: data.detail || data.error || 'Unknown error' });
          }
        } catch (e) {
          results.push({ title: item.title, code: '-', ok: false, error: e.message });
        }
      }

      const ok = results.filter(r => r.ok).length;
      const total = results.length;

      let html = '<table class="results-table"><thead><tr><th>Title</th><th>Assigned Code</th><th>Status</th></tr></thead><tbody>';
      for (const r of results) {
        if (r.ok) {
          html += `<tr><td>${esc(r.title)}</td><td style="font-weight:700;color:#4ade80;font-size:14px">${esc(r.code)}</td><td style="color:#4ade80">Seeded</td></tr>`;
        } else {
          html += `<tr><td>${esc(r.title)}</td><td>-</td><td style="color:#fca5a5">${esc(r.error)}</td></tr>`;
        }
      }
      html += '</tbody></table>';

      const cls = ok === total ? 'summary-ok' : ok > 0 ? 'summary-partial' : 'summary-fail';
      html += `<div class="summary-bar ${cls}">${ok} of ${total} seeded successfully</div>`;

      const container = document.getElementById('req-results');
      container.innerHTML = html;
      showEl('req-results');
      hideEl('req-preview');
      btn.textContent = 'Seed Requirements';
    }

    function clearReq() {
      document.getElementById('req-input').value = '';
      hideEl('req-error');
      hideEl('req-preview');
      hideEl('req-results');
      document.getElementById('req-seed-btn').disabled = true;
      reqParsed = null;
    }

    // ── Lessons Learned ──

    const LL_CATEGORIES = ['Process', 'Tech', 'Arch', 'Quality'];
    const LL_ROUTINGS = ['Bootstrap', 'PK.md', 'CAI Memory', 'Standards'];
    const CATEGORY_MAP = { 'Process': 'process', 'Tech': 'technical', 'Arch': 'architecture', 'Quality': 'quality' };
    const ROUTING_MAP = { 'Bootstrap': 'bootstrap', 'PK.md': 'pk.md', 'CAI Memory': 'cai_memory', 'Standards': 'standards' };
    let llParsed = null;

    function validateLL() {
      hideEl('ll-error');
      hideEl('ll-preview');
      hideEl('ll-results');
      document.getElementById('ll-seed-btn').disabled = true;
      llParsed = null;

      const raw = document.getElementById('ll-input').value.trim();
      if (!raw) { showError('ll-error', 'Input is empty.'); return; }

      let data;
      try { data = JSON.parse(raw); } catch (e) {
        showError('ll-error', 'Invalid JSON: ' + e.message);
        return;
      }
      if (!Array.isArray(data)) { showError('ll-error', 'JSON must be an array of lesson objects.'); return; }
      if (data.length === 0) { showError('ll-error', 'Array is empty.'); return; }

      const errors = [];
      data.forEach((item, i) => {
        const missing = [];
        ['title', 'description', 'resolution', 'category', 'routing'].forEach(f => {
          if (!item[f] || (typeof item[f] === 'string' && !item[f].trim())) missing.push(f);
        });
        if (missing.length) errors.push(`Item ${i + 1}: missing required fields: ${missing.join(', ')}`);
        if (item.category && !LL_CATEGORIES.includes(item.category)) errors.push(`Item ${i + 1}: invalid category "${item.category}" (must be one of: ${LL_CATEGORIES.join(', ')})`);
        if (item.routing && !LL_ROUTINGS.includes(item.routing)) errors.push(`Item ${i + 1}: invalid routing "${item.routing}" (must be one of: ${LL_ROUTINGS.join(', ')})`);
      });

      if (errors.length) { showError('ll-error', errors.join('\n')); return; }

      llParsed = data;
      let html = '<table class="preview-table"><thead><tr><th>#</th><th>Title</th><th>Category</th><th>Routing</th><th>Description</th></tr></thead><tbody>';
      data.forEach((item, i) => {
        html += `<tr><td>${i + 1}</td><td>${esc(item.title)}</td><td>${item.category}</td><td>${item.routing}</td><td>${esc(truncate(item.description, 80))}</td></tr>`;
      });
      html += '</tbody></table>';
      const preview = document.getElementById('ll-preview');
      preview.innerHTML = html;
      showEl('ll-preview');
      document.getElementById('ll-seed-btn').disabled = false;
    }

    async function seedLL() {
      if (!llParsed) return;
      const btn = document.getElementById('ll-seed-btn');
      btn.disabled = true;
      btn.textContent = 'Seeding...';
      hideEl('ll-error');

      const results = [];
      for (const item of llParsed) {
        try {
          const res = await fetch('/api/lessons', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              project: 'metapm',
              category: CATEGORY_MAP[item.category] || item.category.toLowerCase(),
              text: `${item.title}: ${item.description} -- Resolution: ${item.resolution}`,
              target: ROUTING_MAP[item.routing] || item.routing.toLowerCase(),
              by: 'pl',
              source_sprint: 'bulk-seed'
            })
          });
          const data = await res.json();
          if (res.ok) {
            results.push({ title: item.title, id: data.id || '-', ok: true });
          } else {
            results.push({ title: item.title, id: '-', ok: false, error: data.detail || data.error || 'Unknown error' });
          }
        } catch (e) {
          results.push({ title: item.title, id: '-', ok: false, error: e.message });
        }
      }

      const ok = results.filter(r => r.ok).length;
      const total = results.length;

      let html = '<table class="results-table"><thead><tr><th>Title</th><th>Assigned ID</th><th>Status</th></tr></thead><tbody>';
      for (const r of results) {
        if (r.ok) {
          html += `<tr><td>${esc(r.title)}</td><td style="font-weight:700;color:#4ade80;font-size:14px">${esc(r.id)}</td><td style="color:#4ade80">Seeded</td></tr>`;
        } else {
          html += `<tr><td>${esc(r.title)}</td><td>-</td><td style="color:#fca5a5">${esc(r.error)}</td></tr>`;
        }
      }
      html += '</tbody></table>';

      const cls = ok === total ? 'summary-ok' : ok > 0 ? 'summary-partial' : 'summary-fail';
      html += `<div class="summary-bar ${cls}">${ok} of ${total} seeded successfully</div>`;

      const container = document.getElementById('ll-results');
      container.innerHTML = html;
      showEl('ll-results');
      hideEl('ll-preview');
      btn.textContent = 'Seed Lessons';
    }

    function clearLL() {
      document.getElementById('ll-input').value = '';
      hideEl('ll-error');
      hideEl('ll-preview');
      hideEl('ll-results');
      document.getElementById('ll-seed-btn').disabled = true;
      llParsed = null;
    }

    // HTML escaping
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
